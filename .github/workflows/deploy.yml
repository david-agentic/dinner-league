name: Deploy to Cloudflare Pages
on:
  push:
    branches: [main]
  workflow_dispatch:
permissions:
  contents: read
  issues: write
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Tests (money math + JS syntax gate)
        run: |
          node tests/logic.test.js
          node -e "const fs=require('fs');const m=fs.readFileSync('public/index.html','utf8').match(/<script>([\s\S]*)<\/script>/);new Function(m[1]);console.log('JS syntax OK')"
      - name: Check secrets present
        env:
          ST: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          SA: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          VT: ${{ vars.CLOUDFLARE_API_TOKEN }}
          VA: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          src(){ [ -n "$1" ] && echo "in SECRETS" || { [ -n "$2" ] && echo "in VARIABLES tab" || echo "NOT FOUND anywhere"; }; }
          echo "CLOUDFLARE_API_TOKEN: $(src "$ST" "$VT")" | tee -a deploy.log
          echo "CLOUDFLARE_ACCOUNT_ID: $(src "$SA" "$VA")" | tee -a deploy.log
      - name: Deploy
        id: deploy
        continue-on-error: true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN != '' && secrets.CLOUDFLARE_API_TOKEN || vars.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID != '' && secrets.CLOUDFLARE_ACCOUNT_ID || vars.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -o pipefail
          npx wrangler@3 pages deploy public --project-name=dinner-league 2>&1 | tee -a deploy.log
      - name: Report result to issue
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          STATUS="${{ steps.deploy.outcome }}"
          TAIL=$(tail -c 3000 deploy.log 2>/dev/null || echo "no log")
          BODY="**Deploy $STATUS** — commit ${GITHUB_SHA:0:7}

          \`\`\`
          $TAIL
          \`\`\`"
          NUM=$(gh issue list --repo "$GITHUB_REPOSITORY" --label ci-log --state open --json number --jq '.[0].number' || true)
          if [ -z "$NUM" ]; then
            gh label create ci-log --repo "$GITHUB_REPOSITORY" --force
            gh issue create --repo "$GITHUB_REPOSITORY" --title "CI deploy log" --label ci-log --body "$BODY"
          else
            gh issue comment "$NUM" --repo "$GITHUB_REPOSITORY" --body "$BODY"
          fi
      - name: Fail if deploy failed
        if: steps.deploy.outcome == 'failure'
        run: exit 1
